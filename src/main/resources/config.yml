# LoaderWork config
# Minecraft 1.21+ / Spigot / Paper
#
# Main sections:
# - settings: global plugin behavior
# - jobs: job profiles
# - regions: cuboid region definitions
# - messages: chat and action bar texts
#
# Region ids and job ids should use only:
# a-z, 0-9, underscore (_), and dash (-)

settings:
  # Automatically select a job when a player enters its pickup region.
  auto-select-job-by-region: true

  # How often the main logic updates, in ticks.
  # Lower values feel smoother but use a bit more CPU.
  update-interval-ticks: 2

  # How much movement is still considered "standing still" while holding.
  hold-max-move-distance: 0.18

  # How often the carried block particle effect appears, in ticks.
  carry-particle-interval-ticks: 10

jobs:
  quarry_worker:
    enabled: true
    display-name: "Карьерный грузчик"
    permission: ""
    pickup-region: "quarry_pickup"
    dropoff-region: "quarry_dropoff"
    pickup-hold-ticks: 40
    dropoff-hold-ticks: 30
    respawn-delay-ticks: 600

    carry:
      # Slowness amplifier: 0 = Slowness I, 1 = Slowness II, etc.
      slowness-amplifier: 2
      # Fatigue amplifier: 0 = no fatigue, 1 = Fatigue I, etc.
      fatigue-amplifier: 1
      # How often navigation particles point toward the dropoff region.
      navigation-interval-ticks: 20
      # Height of the visual block behind the player.
      display-height: 0.35
      # Distance behind the player for the visual block.
      display-behind-offset: 0.95

    # Leave this list empty to allow any transportable block.
    allowed-blocks:
      - STONE
      - COBBLESTONE
      - IRON_ORE
      - COAL_ORE
      - GRAVEL

    rewards:
      default:
        money: 1.0
        experience: 1
        commands: []
        items: []
      by-block:
        COBBLESTONE:
          money: 1.2
          experience: 1
        IRON_ORE:
          money: 5.0
          experience: 3
          commands:
            - "say %player% delivered iron ore"
        COAL_ORE:
          money: 3.0
          experience: 2
          items:
            - material: TORCH
              amount: 4

  lumberjack:
    enabled: true
    display-name: "Лесной грузчик"
    permission: ""
    pickup-region: "forest_pickup"
    dropoff-region: "forest_dropoff"
    pickup-hold-ticks: 36
    dropoff-hold-ticks: 28
    respawn-delay-ticks: 500

    carry:
      slowness-amplifier: 1
      fatigue-amplifier: 0
      navigation-interval-ticks: 16
      display-height: 0.45
      display-behind-offset: 1.05

    allowed-blocks:
      - OAK_LOG
      - SPRUCE_LOG
      - BIRCH_LOG
      - DARK_OAK_LOG
      - ACACIA_LOG
      - JUNGLE_LOG

    rewards:
      default:
        money: 2.0
        experience: 1
        commands: []
        items: []
      by-block:
        DARK_OAK_LOG:
          money: 3.0
          experience: 2
          commands:
            - "effect give %player% minecraft:haste 20 0 true"

regions:
  # Pickup region for quarry_worker
  quarry_pickup: {}
  # Dropoff region for quarry_worker
  quarry_dropoff: {}

  # Pickup region for lumberjack
  forest_pickup: {}
  # Dropoff region for lumberjack
  forest_dropoff: {}

messages:
  prefix: "&6[LoaderWork] &r"

  no-permission: "&cYou do not have permission for this action."
  plugin-reloaded: "&aPlugin configuration reloaded."
  no-active-job: "&cYou do not have an active job. Use &e/loader job <id>&c or enter a pickup region."
  job-not-found: "&cThat job does not exist."
  job-no-permission: "&cYou do not have access to this job."
  job-command-usage: "&eUsage: /loader job <id>"
  job-selected: "&aYou selected the job: &e%job%&a."
  job-selected-auto: "&aJob selected automatically: &e%job%&a."

  not-in-pickup-region: "&cYou must be inside the pickup region."
  pickup-invalid-block: "&cThat block cannot be used as cargo."
  pickup-block-not-allowed: "&cThat block is not allowed for this job."
  pickup-already-running: "&eA pickup process is already running. Keep crouching and do not move."
  pickup-started: "&eYou started picking up &6%block%&e. Keep crouching and stay still."
  pickup-progress: "&6Pickup progress: &e%progress%%"
  pickup-complete: "&aCargo picked up. Carry &e%block% &ato the dropoff region."
  pickup-cancelled-not-sneaking: "&cYou stopped crouching. Pickup cancelled."
  pickup-cancelled-moved: "&cYou moved. Pickup cancelled."
  pickup-cancelled-left-region: "&cYou left the pickup region. Pickup cancelled."
  pickup-cancelled-block-changed: "&cThe block changed or became unavailable. Pickup cancelled."
  pickup-cancelled-manual: "&ePickup cancelled manually."

  carry-state: "&eYou are carrying &6%block%&e. Go to the dropoff region and crouch on the spot."
  carry-cancelled: "&eCargo transport cancelled. The block was returned."
  dropoff-ready: "&eYou are in the dropoff region. Crouch and stay still to unload."
  dropoff-progress: "&6Dropoff progress: &e%progress%%"
  dropoff-cancelled-moved: "&cYou moved. Dropoff cancelled."
  dropoff-complete: "&aCargo delivered. Reward: &e%money%&a, xp: &e%experience%&a, items: &e%items%&a."

  nothing-to-cancel: "&eThere is nothing to cancel right now."
  region-point-set: "&aCorner &e%corner%&a saved for region &e%region%&a: &f%location%&a."
  region-cleared: "&aRegion cleared for job &e%job%&a."
