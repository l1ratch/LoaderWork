  job-not-found: "&cТакой работы не существует."
  job-no-permission: "&cУ вас нет доступа к этой работе."
  job-command-usage: "&eИспользование: /loader job <id>"
  job-selected: "&aВы выбрали работу: &e%job%&a."
  job-selected-auto: "&aРабота выбрана автоматически: &e%job%&a."

  not-in-pickup-region: "&cВы должны находиться в pickup-регионе."
  pickup-invalid-block: "&cЭтот блок нельзя использовать как груз."
  pickup-block-not-allowed: "&cЭтот блок не разрешён для этой работы."
  pickup-already-running: "&eПроцесс подъёма уже идёт. Продолжайте приседать и не двигайтесь."
  pickup-started: "&eВы начали поднимать блок &6%block%&e. Продолжайте приседать и стойте на месте."
  pickup-progress: "&6Прогресс подъёма: &e%progress%%"
  pickup-complete: "&aГруз поднят. Отнесите &e%block% &aв dropoff-регион."
  pickup-cancelled-not-sneaking: "&cВы перестали приседать. Подъём отменён."
  pickup-cancelled-moved: "&cВы двинулись. Подъём отменён."
  pickup-cancelled-left-region: "&cВы вышли из pickup-региона. Подъём отменён."
  pickup-cancelled-block-changed: "&cБлок изменился или стал недоступен. Подъём отменён."
  pickup-cancelled-manual: "&eПодъём отменён вручную."

  carry-state: "&eВы несёте &6%block%&e. Идите в dropoff-регион и присядьте на месте."
