# Конфиг LoaderWork
# Minecraft 1.21+ / Spigot / Paper
#
# Основные разделы:
# - settings: общие настройки плагина
# - jobs: профили работ
# - regions: прямоугольные регионы
# - messages: тексты чата и action bar
#
# Идентификаторы работ и регионов должны содержать только:
# a-z, 0-9, подчёркивание (_) и дефис (-)

settings:
  # Автоматически выбирать работу, когда игрок заходит в pickup-регион.
  auto-select-job-by-region: true

  # Как часто обновляется основная логика, в тиках.
  # Меньшее значение даёт более плавную работу, но немного сильнее грузит CPU.
  update-interval-ticks: 2

  # Насколько сильное движение ещё считается "стоянием на месте" во время удержания.
  hold-max-move-distance: 0.18

  # Как часто появляются частицы у переносимого блока, в тиках.
  carry-particle-interval-ticks: 10

jobs:
  quarry_worker:
    enabled: true
    display-name: "Карьеровщик"
    permission: ""
    pickup-region: "quarry_pickup"
    dropoff-region: "quarry_dropoff"
    pickup-hold-ticks: 40
    dropoff-hold-ticks: 30
    respawn-delay-ticks: 600

    carry:
      # Усилитель замедления: 0 = Slowness I, 1 = Slowness II и т.д.
      slowness-amplifier: 2
      # Усилитель усталости: 0 = без усталости, 1 = Fatigue I и т.д.
      fatigue-amplifier: 1
      # Как часто навигационные частицы показывают направление к dropoff-региону.
      navigation-interval-ticks: 20
      # Высота визуального блока за игроком.
      display-height: 0.35
      # Смещение визуального блока позади игрока.
      display-behind-offset: 0.95

    # Если список пуст, можно переносить любой подходящий блок.
    allowed-blocks:
      - STONE
      - COBBLESTONE
      - IRON_ORE
      - COAL_ORE
      - GRAVEL

    rewards:
      default:
        money: 1.0
        experience: 1
        commands: []
        items: []
      by-block:
        COBBLESTONE:
          money: 1.2
          experience: 1
        IRON_ORE:
          money: 5.0
          experience: 3
          commands:
            - "say %player% сдал железную руду"
        COAL_ORE:
          money: 3.0
          experience: 2
          items:
            - material: TORCH
              amount: 4

  lumberjack:
    enabled: true
    display-name: "Лесоруб"
    permission: ""
    pickup-region: "forest_pickup"
    dropoff-region: "forest_dropoff"
    pickup-hold-ticks: 36
    dropoff-hold-ticks: 28
    respawn-delay-ticks: 500

    carry:
      slowness-amplifier: 1
      fatigue-amplifier: 0
      navigation-interval-ticks: 16
      display-height: 0.45
      display-behind-offset: 1.05

    allowed-blocks:
      - OAK_LOG
      - SPRUCE_LOG
      - BIRCH_LOG
      - DARK_OAK_LOG
      - ACACIA_LOG
      - JUNGLE_LOG

    rewards:
      default:
        money: 2.0
        experience: 1
        commands: []
        items: []
      by-block:
        DARK_OAK_LOG:
          money: 3.0
          experience: 2
          commands:
            - "effect give %player% minecraft:haste 20 0 true"

regions:
  # Pickup-регион для quarry_worker
  quarry_pickup: {}
  # Dropoff-регион для quarry_worker
  quarry_dropoff: {}

  # Pickup-регион для lumberjack
  forest_pickup: {}
  # Dropoff-регион для lumberjack
  forest_dropoff: {}

