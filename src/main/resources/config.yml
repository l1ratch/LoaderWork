  dropoff-cancelled-moved: "&cВы двинулись. Сдача отменена."
  dropoff-complete: "&aГруз сдан. Награда: &e%money%&a, опыт: &e%experience%&a, предметы: &e%items%&a."

  nothing-to-cancel: "&eСейчас нечего отменять."
  region-point-set: "&aТочка &e%corner%&a сохранена для региона &e%region%&a: &f%location%&a."
  region-cleared: "&aРегион для работы &e%job%&a очищен."
