name: LoaderWork
version: '${project.version}'
main: ru.l1ratch.loaderwork.LoaderWork
api-version: '1.21'
softdepend: [Vault]
description: Плагин для переноски грузов по работам для 1.21+ с удержанием, наградами и навигацией

commands:
  loader:
    description: Основная команда LoaderWork
    usage: /loader <help|list|job|edit|config|info|inspect|cancel|region|reload>
    aliases: [ld, work, jobs]

permissions:
  loader.use:
    description: Доступ к игровому процессу LoaderWork и базовым командам
    default: true
  loader.cancel:
    description: Возможность отменять подъём или перенос груза
    default: true
  loader.admin:
    description: Административный доступ к LoaderWork
    default: op
